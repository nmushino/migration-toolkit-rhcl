%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.flyway.enabled=false

%test.quarkus.kubernetes-client.trust-certs=true
%test.quarkus.kubernetes-client.namespace=test-namespace
%test.quarkus.kubernetes-client.api-server-url=http://localhost:9999

quarkus.log.level=WARN
quarkus.log.category."com.redhat.migrationtoolkit".level=DEBUG

# JaCoCo: accumulate coverage across multiple Quarkus context restarts
quarkus.jacoco.reuse-data-file=true
