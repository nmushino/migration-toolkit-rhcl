apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: crunchy-postgres
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: false
allowPrivilegedContainer: false
fsGroup:
  type: RunAsAny
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: MustRunAs
seccompProfiles:
- '*'
supplementalGroups:
  type: RunAsAny
users:
- system:serviceaccount:NAMESPACE_PLACEHOLDER:migration-tool-db-instance
- system:serviceaccount:NAMESPACE_PLACEHOLDER:migration-tool-db-repohost
- system:serviceaccount:NAMESPACE_PLACEHOLDER:migration-tool-db-pgbackrest
volumes:
- configMap
- downwardAPI
- emptyDir
- persistentVolumeClaim
- projected
- secret