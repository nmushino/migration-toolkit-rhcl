apiVersion: apps/v1
kind: Deployment
metadata:
  name: migration-tool-frontend
  namespace: NAMESPACE_PLACEHOLDER
  labels:
    app: migration-tool
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: migration-tool
      component: frontend
  template:
    metadata:
      labels:
        app: migration-tool
        component: frontend
    spec:
      containers:
        - name: frontend
          image: image-registry.openshift-image-registry.svc:5000/migration-toolkit/migration-tool-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: REACT_APP_API_URL
              valueFrom:
                configMapKeyRef:
                  name: migration-tool-config
                  key: backend-url
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
