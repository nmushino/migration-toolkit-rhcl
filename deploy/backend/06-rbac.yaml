---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: migration-tool-backend
  namespace: NAMESPACE_PLACEHOLDER
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: migration-tool-applier
rules:
  - apiGroups: ["", "apps", "networking.k8s.io", "route.openshift.io",
                "kuadrant.io", "gateway.networking.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "create", "update", "patch", "apply"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: migration-tool-applier-binding
subjects:
  - kind: ServiceAccount
    name: migration-tool-backend
    namespace: NAMESPACE_PLACEHOLDER
roleRef:
  kind: ClusterRole
  name: migration-tool-applier
  apiGroup: rbac.authorization.k8s.io
